version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: applyiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: applyiq
      POSTGRES_PASSWORD: applyiq_pass
      POSTGRES_DB: applyiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyiq -d applyiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis 7 (BullMQ queue backend)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: applyiq_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Next.js Web App
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: applyiq_web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development

  # ─────────────────────────────────────────────
  # FastAPI Python Microservice (AI/ML)
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: applyiq_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    environment:
      - PYTHONUNBUFFERED=1

  # ─────────────────────────────────────────────
  # BullMQ Worker (scraping + auto-apply jobs)
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: applyiq_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # ─────────────────────────────────────────────
  # Prisma Studio (DB GUI — dev only)
  # ─────────────────────────────────────────────
  prisma-studio:
    image: node:20-alpine
    container_name: applyiq_prisma_studio
    working_dir: /app
    env_file: .env
    ports:
      - "5555:5555"
    volumes:
      - ./packages/db:/app
    command: npx prisma studio --port 5555 --browser none
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev-tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: applyiq_network
